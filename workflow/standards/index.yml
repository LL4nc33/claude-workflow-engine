# Workflow Standards Index
# Used for intelligent standard matching based on task context
# Each entry maps to: workflow/standards/{domain}/{topic}.md
# Skills auto-load from: .claude/skills/workflow/{domain}-standards/SKILL.md

global:
  tech-stack:
    description: Technology stack definitions, framework versions, and tooling choices
    tags: [technology, framework, tooling, infrastructure-choice]
  naming:
    description: Naming conventions for files, code identifiers, APIs, and git artifacts
    tags: [naming, convention, files, variables, endpoints]
  toon-format:
    description: Token-optimized notation format for context budget optimization (~40% savings)
    tags: [toon, json, token, optimization, compression, context]

devops:
  ci-cd:
    description: CI/CD pipeline conventions, GitHub Actions patterns, deployment workflows
    tags: [ci, cd, pipeline, github-actions, deployment]
  containerization:
    description: Docker multi-stage builds, security scanning, image optimization
    tags: [docker, container, image, registry]
  infrastructure:
    description: Infrastructure as Code patterns, Terraform, Kubernetes conventions
    tags: [terraform, kubernetes, iac, cloud, aws, hetzner]

cli:
  command-structure:
    description: CLI command skeleton, async function pattern, args parsing, Logger init
    tags: [cli, command, args, async, pattern]
  exit-codes:
    description: Process exit codes (0=success, 1=error, 2=warnings, 3=not-installed)
    tags: [cli, exit-code, error, process]
  logger-usage:
    description: Structured Logger methods, semantic severity levels, output formatting
    tags: [cli, logger, output, severity, formatting]
  type-definitions:
    description: Central types.ts structure, naming conventions, interface patterns
    tags: [cli, types, interface, typescript, naming]
  validation-pattern:
    description: CheckResult format, Validator class pattern, Report aggregation, AutoFix
    tags: [cli, validation, check, preflight, health, autofix]

agents:
  agent-conventions:
    description: Agent definition standards, permission models, skill formats, Agent-First enforcement
    tags: [agent, skill, permission, orchestration, enforcement, agent-first]
  plugin-extension:
    description: Rules for adding Agents, Skills, Commands to the Engine with sync checklist
    tags: [agent, skill, command, plugin, extension, frontmatter]
  completion-workflow:
    description: Task completion checklist, documentation triggers, NaNo observation recording, user notification format
    tags: [completion, verification, documentation, nano, notification, quality-gate]

api:
  response-format:
    description: API response envelope structure, pagination, status codes
    tags: [api, response, json, http, rest, status-code]
  error-handling:
    description: Error hierarchy, error codes, logging levels, GDPR-compliant error responses
    tags: [error, exception, logging, error-code, gdpr]

database:
  migrations:
    description: Database migration naming, reversibility rules, safe schema change patterns
    tags: [database, migration, sql, schema, orm]

testing:
  coverage:
    description: Test coverage targets, test structure (AAA), CI integration, test data rules
    tags: [test, coverage, unit-test, integration, e2e, ci]

frontend:
  components:
    description: UI component structure, naming, accessibility, state management patterns
    tags: [component, ui, react, accessibility, a11y, state]
  design-tokens:
    description: Design token naming, color system, typography scale, spacing conventions
    tags: [design-tokens, css-variables, colors, typography, spacing, theming, visual-clone]
