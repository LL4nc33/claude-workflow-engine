# =============================================================================
# Claude Workflow Engine Configuration - oidanice-agents
# Version: 0.2.9
# GDPR-compliant setup for Austrian/EU usage
# =============================================================================

version: 0.2.9
default_profile: default

# -----------------------------------------------------------------------------
# Claude Code Integration
# -----------------------------------------------------------------------------

# Enable Claude Code slash commands
# Workflow: /plan-product, /shape-spec, /write-spec, /create-tasks, /orchestrate-tasks
# Standards: /discover-standards, /index-standards, /inject-standards
claude_code_commands: true

# Allow delegation to specialized subagents (architect, builder, security, etc.)
use_claude_code_subagents: true

# Convert standards to Claude Code Skills for context-efficient auto-matching
# This means Claude automatically applies relevant standards based on task context
# rather than injecting all standards into every prompt
standards_as_claude_code_skills: true

# Token optimization: selective standards injection uses tag-based matching
# from index.yml to only inject relevant standards per task delegation
selective_standards_injection: true

# Disable non-Claude-Code agent outputs (Cursor, Codex, Gemini)
workflow_engine_commands: false

# -----------------------------------------------------------------------------
# 3-Layer Context Model
# -----------------------------------------------------------------------------

context_model:
  # Layer 1: HOW you build (conventions, patterns, best practices)
  standards:
    path: workflow/standards/
    auto_inject: false  # Use skills-based matching instead
    domains:
      - global       # Cross-cutting conventions (tech-stack, naming)
      - devops       # CI/CD, Docker, K8s, IaC
      - agents       # Agent-specific standards
      - api          # Response format, error handling
      - database     # Migration patterns
      - frontend     # Component standards
      - testing      # Coverage targets, test structure

  # Layer 2: WHAT you're building and WHY (mission, vision, roadmap)
  product:
    path: workflow/product/
    files:
      - mission.md
      - roadmap.md
      - architecture.md

  # Layer 3: WHAT to build next (detailed feature specifications)
  specs:
    path: workflow/specs/
    naming_convention: "{timestamp}-{feature-name}/"

# -----------------------------------------------------------------------------
# Agent System Integration
# -----------------------------------------------------------------------------

agents:
  directory: .claude/agents/
  available:
    - name: architect
      access: read-only
      purpose: System design, ADRs, architectural review
    - name: builder
      access: full
      purpose: Bug investigation with full filesystem access
    - name: devops
      access: full
      purpose: CI/CD, Docker, Kubernetes, IaC
    - name: explainer
      access: read-only
      purpose: Explanations, learning, documentation queries
    - name: guide
      access: read-only
      purpose: NaNo evolution, pattern-to-standards, process improvement
    - name: innovator
      access: read-only
      purpose: Brainstorming, creative solutions, what-if exploration
    - name: quality
      access: read-only
      purpose: Testing, coverage analysis, quality gates
    - name: researcher
      access: read-only
      purpose: Codebase analysis and documentation generation
    - name: security
      access: read-only
      purpose: OWASP audits, vulnerability assessment

# -----------------------------------------------------------------------------
# GDPR / EU Compliance
# -----------------------------------------------------------------------------

gdpr:
  enabled: true
  data_residency: eu-central-1  # Frankfurt - Austrian/EU compliance

  # Local-only operation: Claude Workflow Engine makes NO external API calls
  # Standards, specs, and configurations remain in filesystem/VCS
  local_only: true

  # Sensitive data handling
  sensitive_data:
    # Personal data must never appear in standards or specs
    pii_in_standards: forbidden
    pii_in_specs: forbidden

    # Use .local.md files for any project-specific personal data
    local_files_only: true

    # These files are auto-gitignored
    gitignored_patterns:
      - "CLAUDE.local.md"
      - "*.local.md"
      - ".env*"
      - "credentials.*"
      - "secrets.*"

  # Audit trail
  audit:
    log_spec_changes: true
    log_standard_changes: true

# -----------------------------------------------------------------------------
# Orchestration
# -----------------------------------------------------------------------------

orchestration:
  config_file: workflow/orchestration.yml
  # Per-spec orchestration configs are generated in each spec folder
  per_spec_config: workflow/specs/{folder}/orchestration.yml
  default_execution_mode: phase-by-phase
  track_progress: true

# -----------------------------------------------------------------------------
# Plugin Architecture (6 Layers)
# -----------------------------------------------------------------------------

plugin:
  name: claude-workflow-engine
  version: 0.2.9
  manifest: .claude-plugin/plugin.json
  layers:
    - layer: 1
      name: CLAUDE.md
      path: .claude/CLAUDE.md
    - layer: 2
      name: Commands
      path: .claude/commands/workflow/
    - layer: 3
      name: Skills
      path: .claude/skills/workflow/
    - layer: 4
      name: Agents
      path: .claude/agents/
    - layer: 5
      name: Hooks
      path: hooks/hooks.json
    - layer: 6
      name: Plugin Packaging
      path: .claude-plugin/plugin.json

# -----------------------------------------------------------------------------
# MCP Server Integration (recommended, not required)
# -----------------------------------------------------------------------------

mcp:
  recommended_servers:
    - name: serena
      description: Semantic code analysis via Language Server
      tools:
        - find_symbol
        - get_symbols_overview
        - find_referencing_symbols
        - replace_symbol_body
        - search_for_pattern
      used_by: [architect, researcher, builder, explainer]

    - name: greptile
      description: PR management and code review integration
      tools:
        - list_merge_requests
        - get_merge_request
        - search_greptile_comments
        - list_merge_request_comments
      used_by: [quality, security]

# -----------------------------------------------------------------------------
# Project-Type Templates (First-Run)
# Pre-configured setups for common project types.
# Selected during first-run or via /workflow:plan-product.
# -----------------------------------------------------------------------------

project_types:
  web-app:
    name: "Web Application"
    description: "Full-stack web app with frontend and backend"
    standards_domains: [global, frontend, api, database, testing]
    suggested_agents: [builder, architect, security]
    tech_stack_defaults:
      frontend: ["React", "Next.js", "Vue", "Svelte"]
      backend: ["Node.js", "Python", "Go"]
      database: ["PostgreSQL", "MySQL", "MongoDB"]
    initial_structure:
      - src/components/
      - src/pages/
      - src/api/
      - src/lib/
      - tests/

  api:
    name: "API / Backend Service"
    description: "REST or GraphQL API without frontend"
    standards_domains: [global, api, database, testing, devops]
    suggested_agents: [builder, architect, security, devops]
    tech_stack_defaults:
      runtime: ["Node.js", "Python", "Go", "Rust"]
      framework: ["Express", "Fastify", "FastAPI", "Gin"]
      database: ["PostgreSQL", "MongoDB", "Redis"]
    initial_structure:
      - src/routes/
      - src/controllers/
      - src/models/
      - src/middleware/
      - tests/

  cli:
    name: "CLI Tool"
    description: "Command-line application"
    standards_domains: [global, testing]
    suggested_agents: [builder, architect]
    tech_stack_defaults:
      language: ["TypeScript", "Python", "Go", "Rust"]
      framework: ["Commander.js", "Yargs", "Click", "Cobra"]
    initial_structure:
      - src/commands/
      - src/utils/
      - tests/

  library:
    name: "Library / Package"
    description: "Reusable library for npm/pip/crates"
    standards_domains: [global, testing]
    suggested_agents: [builder, architect, researcher]
    tech_stack_defaults:
      language: ["TypeScript", "Python", "Rust"]
      build: ["tsup", "esbuild", "setuptools", "cargo"]
    initial_structure:
      - src/
      - tests/
      - examples/

  mobile:
    name: "Mobile App"
    description: "iOS/Android app (React Native, Flutter, etc.)"
    standards_domains: [global, frontend, api, testing]
    suggested_agents: [builder, architect]
    tech_stack_defaults:
      framework: ["React Native", "Flutter", "Expo"]
      backend: ["Firebase", "Supabase", "Custom API"]
    initial_structure:
      - src/screens/
      - src/components/
      - src/navigation/
      - src/services/

  monorepo:
    name: "Monorepo"
    description: "Multi-package repository (Turborepo, Nx, etc.)"
    standards_domains: [global, api, frontend, database, testing, devops]
    suggested_agents: [builder, architect, devops, quality]
    tech_stack_defaults:
      tooling: ["Turborepo", "Nx", "Lerna", "pnpm workspaces"]
    initial_structure:
      - packages/
      - apps/
      - libs/
      - tooling/

# -----------------------------------------------------------------------------
# Profile Configuration
# -----------------------------------------------------------------------------

profiles:
  default:
    description: Base standards applicable to all projects
  oidanice:
    inherits_from: default
    description: oidanice-agents specific standards and conventions
