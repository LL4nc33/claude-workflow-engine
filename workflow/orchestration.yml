# =============================================================================
# Claude Workflow Engine Orchestration Configuration
# Optimized for 7-agent system with 4 quality gates, fallback strategies,
# and observability hooks.
# Version: 0.2.7
# =============================================================================

project_name: "Claude Workflow Engine"
version: "0.2.7"

# -----------------------------------------------------------------------------
# Workflow Phases (5-Phase Command Chain)
# Each phase maps to a slash command and produces specific artifacts.
# Phases are sequential - each requires completion of its prerequisite.
# -----------------------------------------------------------------------------

workflow:
  phases:
    - name: plan-product
      command: /plan-product
      description: Define mission, goals, constraints
      output_path: workflow/product/
      outputs:
        - mission.md
        - roadmap.md
        - architecture.md
      prerequisites: []
      responsible_agent: architect
      review_agent: null
      quality_gate: null

    - name: shape-spec
      command: /shape-spec
      description: Gather requirements, references, stakeholder input
      output_path: workflow/specs/{timestamp}-{feature-slug}/
      outputs:
        - shape.md
        - references.md
        - standards.md
        - visuals/
      prerequisites:
        - plan-product
      responsible_agent: researcher
      review_agent: architect
      quality_gate: null

    - name: write-spec
      command: /write-spec
      description: Create technical specification from shape
      output_path: workflow/specs/{timestamp}-{feature-slug}/
      outputs:
        - spec.md
      prerequisites:
        - shape-spec
      responsible_agent: architect
      review_agent: security
      quality_gate: gate_1_pre_implementation

    - name: create-tasks
      command: /create-tasks
      description: Break spec into implementable, delegatable tasks
      output_path: workflow/specs/{timestamp}-{feature-slug}/
      outputs:
        - tasks.md
        - orchestration.yml
      prerequisites:
        - write-spec
      responsible_agent: orchestrator
      review_agent: architect
      quality_gate: gate_2_pre_execution

    - name: orchestrate-tasks
      command: /orchestrate-tasks
      description: Delegate tasks to specialized agents, track progress
      output_path: workflow/specs/{timestamp}-{feature-slug}/
      outputs:
        - progress.md
        - delegation.log
      prerequisites:
        - create-tasks
      responsible_agent: orchestrator
      review_agent: null
      quality_gate: gate_3_post_phase

# -----------------------------------------------------------------------------
# Agent Registry
# Complete mapping of all 7 agents with capabilities, tools, and constraints.
# Tools must match the agent .md frontmatter definitions exactly.
# -----------------------------------------------------------------------------

agents:
  registry:
    architect:
      access: read-only
      tools: [Read, Grep, Glob, WebSearch, WebFetch]
      strengths:
        - System design and decomposition
        - Architecture Decision Records (ADRs)
        - API design review and consistency
        - Dependency analysis and technology evaluation
        - Trade-off analysis
      standards_domains: [global, agents]
      context_sources:
        - workflow/standards/global/tech-stack.md
        - workflow/standards/agents/agent-conventions.md
        - workflow/product/mission.md
        - workflow/product/architecture.md
        - workflow/product/roadmap.md

    ask:
      access: read-only
      tools: [Read, Grep, Glob]
      strengths:
        - Code explanations and walkthroughs
        - Concept clarification
        - Pattern identification and explanation
        - Learning-oriented responses
      standards_domains: [global]
      context_sources:
        - workflow/standards/global/tech-stack.md
        - workflow/product/mission.md
        - workflow/product/architecture.md

    debug:
      access: full
      tools: [Read, Write, Edit, Bash, Grep, Glob]
      strengths:
        - Bug investigation and root cause analysis
        - Code implementation from specs
        - Performance profiling and optimization
        - Test writing and regression prevention
      standards_domains: [global, api, database, frontend, testing]
      context_sources:
        - workflow/standards/global/tech-stack.md
        - workflow/standards/global/naming.md
        - workflow/standards/api/error-handling.md
        - workflow/standards/api/response-format.md
        - workflow/standards/database/migrations.md
        - workflow/standards/frontend/components.md
        - workflow/standards/testing/coverage.md
        - workflow/product/mission.md
        - workflow/product/architecture.md

    security:
      access: restricted
      tools: [Read, Grep, Glob, "Bash(trivy:*)", "Bash(grype:*)", "Bash(semgrep:*)", "Bash(nmap:*)", "Bash(curl:*)"]
      strengths:
        - OWASP Top 10 vulnerability assessment
        - Authentication and authorization review
        - Input validation and sanitization
        - Secrets management and credential detection
        - Dependency CVE scanning
        - GDPR/EU compliance verification
      standards_domains: [global, api]
      context_sources:
        - workflow/standards/global/tech-stack.md
        - workflow/standards/global/naming.md
        - workflow/standards/api/error-handling.md
        - workflow/standards/api/response-format.md
        - workflow/product/mission.md
        - workflow/product/architecture.md

    devops:
      access: full
      tools: [Read, Write, Edit, Bash, Grep, Glob]
      strengths:
        - CI/CD pipeline design (GitHub Actions)
        - Docker multi-stage builds
        - Kubernetes manifests and Helm charts
        - Terraform Infrastructure as Code
        - Deployment strategies
        - Monitoring and observability setup
        - EU-compliant infrastructure
      standards_domains: [devops, global]
      context_sources:
        - workflow/standards/devops/ci-cd.md
        - workflow/standards/devops/containerization.md
        - workflow/standards/devops/infrastructure.md
        - workflow/standards/global/tech-stack.md
        - workflow/product/mission.md
        - workflow/product/architecture.md

    researcher:
      access: read-only
      tools: [Read, Grep, Glob, WebSearch, WebFetch]
      strengths:
        - Codebase analysis and pattern discovery
        - Documentation generation
        - Standards extraction and formalization
        - Technology comparison and evaluation
        - Best practice research
      standards_domains: [global, agents]
      context_sources:
        - workflow/standards/global/tech-stack.md
        - workflow/standards/agents/agent-conventions.md
        - workflow/product/mission.md
        - workflow/product/architecture.md
        - workflow/product/roadmap.md

    orchestrator:
      access: task-delegation
      tools: [Task, Read, Grep, Glob]
      strengths:
        - Task decomposition and dependency resolution
        - Agent selection and delegation
        - Progress tracking and status reporting
        - Quality gate enforcement
        - Failure handling and escalation
        - Parallel execution coordination
      standards_domains: [agents, global]
      context_sources:
        - workflow/standards/agents/agent-conventions.md
        - workflow/standards/global/tech-stack.md
        - workflow/product/mission.md
        - workflow/product/architecture.md

# -----------------------------------------------------------------------------
# Task-to-Agent Mapping
# Primary assignment + review agent + override conditions.
# The orchestrator uses this to determine delegation targets.
# -----------------------------------------------------------------------------

task_groups:
  # Implementation tasks -> debug agent
  backend:
    primary_agent: debug
    review_agent: architect
    standards: [global/tech-stack, global/naming, api/response-format, api/error-handling]
    override_when:
      security_sensitive: security  # Auth endpoints, crypto, etc.

  frontend:
    primary_agent: debug
    review_agent: architect
    standards: [global/tech-stack, global/naming, frontend/components]
    override_when: {}

  testing:
    primary_agent: debug
    review_agent: null
    standards: [global/tech-stack, testing/coverage]
    override_when: {}

  database:
    primary_agent: debug
    review_agent: architect
    standards: [global/tech-stack, global/naming, database/migrations]
    override_when:
      schema_breaking_change: architect  # Needs architecture review first

  # Security tasks -> security agent
  security:
    primary_agent: security
    review_agent: architect
    standards: [global/tech-stack, global/naming, api/error-handling]
    override_when:
      implementation_needed: debug  # If fix requires code changes

  # Infrastructure tasks -> devops agent
  infrastructure:
    primary_agent: devops
    review_agent: architect
    standards: [devops/ci-cd, devops/containerization, devops/infrastructure]
    override_when: {}

  ci_cd:
    primary_agent: devops
    review_agent: security
    standards: [devops/ci-cd, devops/containerization]
    override_when: {}

  # Release tasks -> devops agent
  release:
    primary_agent: devops
    review_agent: null
    standards: [devops/ci-cd]
    override_when: {}
    notes: "Uses scripts/release.sh and VERSION file as Single Source of Truth"

  # Architecture tasks -> architect agent
  architecture:
    primary_agent: architect
    review_agent: security
    standards: [global/tech-stack, agents/agent-conventions]
    override_when: {}

  # Documentation tasks -> researcher agent
  documentation:
    primary_agent: researcher
    review_agent: null
    standards: [global/tech-stack, global/naming]
    override_when: {}

  # Review tasks -> architect (default) or security
  review:
    primary_agent: architect
    review_agent: null
    standards: [global/tech-stack, agents/agent-conventions]
    override_when:
      security_review: security
      infra_review: devops

  # Explanation tasks -> ask agent
  explanation:
    primary_agent: ask
    review_agent: null
    standards: [global/tech-stack]
    override_when:
      implementation_needed: debug

  # Coordination tasks -> orchestrator
  coordination:
    primary_agent: orchestrator
    review_agent: null
    standards: [agents/agent-conventions, global/tech-stack]
    override_when: {}

  # Research tasks -> researcher
  research:
    primary_agent: researcher
    review_agent: null
    standards: [global/tech-stack]
    override_when: {}

# -----------------------------------------------------------------------------
# Standards Injection
# Controls how standards content is provided to delegated agents.
# Method: inline = paste full content into delegation prompt.
# Subagents cannot read file references - they need content inline.
# -----------------------------------------------------------------------------

standards_injection:
  method: inline
  standards_path: workflow/standards/

  # Always injected regardless of task type (global baseline)
  always_inject:
    - global/tech-stack

  # Domain-specific injection rules
  domain_mapping:
    backend:
      - global/naming
      - api/response-format
      - api/error-handling
    frontend:
      - global/naming
      - frontend/components
    database:
      - database/migrations
      - global/naming
    testing:
      - testing/coverage
    devops:
      - devops/ci-cd
      - devops/containerization
      - devops/infrastructure
    security:
      - global/naming
      - api/error-handling
    agents:
      - agents/agent-conventions

  # Token optimization: only inject standards relevant to the task.
  # The orchestrator reads standards content and embeds it inline.
  # This avoids loading all 11 standards for every delegation.
  optimization:
    max_standards_per_task: 4
    prefer_skill_reference: false  # Skills don't work in subagent context
    cache_standard_content: true   # Orchestrator caches file reads within session

    # Selective injection: match standards by task tags from index.yml
    # Only injects standards whose tags overlap with the task context
    selective_matching:
      enabled: true
      # Minimum tag overlap score (0.0-1.0) to include a standard
      min_relevance_score: 0.3
      # Always include global/tech-stack regardless of score
      always_include: [global/tech-stack]
      # Exclude standards that exceed this token count (approximate)
      max_tokens_per_standard: 3000

    # Session-level caching to avoid re-reading unchanged files
    session_cache:
      enabled: true
      # Invalidate cache when file mtime changes
      invalidation: file_mtime
      # Maximum cached standards (LRU eviction)
      max_entries: 20

    # Compact injection format: strip comments and empty lines from standards
    compact_format:
      enabled: true
      strip_comments: true
      strip_empty_lines: true
      # Use TOON-like compression for repeated patterns
      deduplicate_examples: true

    # TOON format conversion for JSON content in delegation prompts
    # Converts structured JSON data to TOON notation (~40% token savings)
    # Does NOT apply to: standards (already Markdown), code to write/edit
    toon_conversion:
      enabled: true
      # Minimum JSON size (approximate tokens) before conversion triggers
      min_json_tokens: 200
      # Convert completed task outputs (often JSON/structured) to TOON
      convert_completed_outputs: true
      # Convert API response excerpts embedded in context
      convert_api_responses: true
      # CLI tool for conversion in shell workflows
      cli_command: "npx @toon-format/cli"

# -----------------------------------------------------------------------------
# Quality Gates (4-Gate Architecture)
# Gates enforce review checkpoints at critical workflow transitions.
# Each gate defines who reviews, what is checked, and blocking behavior.
# -----------------------------------------------------------------------------

quality_gates:
  # GATE 1: Pre-Implementation
  # Fires after /write-spec, before /create-tasks
  # Ensures spec is architecturally sound and security-reviewed
  gate_1_pre_implementation:
    trigger: after_write_spec
    blocking: true
    reviewers:
      - agent: architect
        checks:
          - spec_architecturally_sound
          - dependencies_identified
          - tech_stack_aligned
          - scope_reasonable
      - agent: security
        checks:
          - no_security_antipatterns
          - auth_model_defined
          - data_flow_gdpr_compliant
          - threat_model_considered
    pass_condition: all_reviewers_approve
    on_failure:
      action: pause_and_report
      notify: user
      allow_override: true
      override_requires: user_acknowledgement

  # GATE 2: Pre-Execution
  # Fires after /create-tasks, before /orchestrate-tasks
  # Ensures task breakdown is correct and delegation is safe
  gate_2_pre_execution:
    trigger: after_create_tasks
    blocking: true
    reviewers:
      - agent: architect
        checks:
          - tasks_cover_spec_requirements
          - dependencies_correctly_ordered
          - agent_assignments_appropriate
          - no_scope_creep
    pass_condition: all_reviewers_approve
    on_failure:
      action: pause_and_report
      notify: user
      allow_override: true
      override_requires: user_acknowledgement

  # GATE 3: Post-Phase
  # Fires after each orchestration phase completes
  # Validates outputs before proceeding to next phase
  gate_3_post_phase:
    trigger: after_each_phase
    blocking: true
    checks_by_phase:
      data_layer:
        - schema_valid
        - types_consistent
        - migrations_reversible
      api_layer:
        - endpoints_documented
        - error_handling_present
        - standards_compliant
        - response_format_correct
      frontend_layer:
        - components_typed
        - state_managed
        - accessibility_basic
        - naming_conventions_followed
      testing_layer:
        - coverage_threshold_met    # 80% minimum
        - edge_cases_covered
        - integration_passing
        - no_flaky_tests
      infrastructure_layer:
        - iac_valid                 # terraform validate / docker build --check
        - security_scanned
        - eu_compliance_verified
        - rollback_path_defined
    on_failure:
      action: retry_phase
      max_retries: 1
      then: pause_and_report

  # GATE 4: Final Acceptance
  # Fires after all orchestration phases complete
  # Full review before declaring feature "done"
  gate_4_final_acceptance:
    trigger: after_orchestration_complete
    blocking: true
    reviewers:
      - agent: security
        checks:
          - no_new_vulnerabilities
          - secrets_not_exposed
          - dependency_cves_addressed
          - gdpr_compliance_verified
      - agent: architect
        checks:
          - implementation_matches_spec
          - no_architectural_drift
          - standards_followed
          - documentation_complete
      - agent: user
        checks:
          - acceptance_criteria_met
          - manual_review_complete
    pass_condition: all_reviewers_approve
    on_failure:
      action: create_remediation_tasks
      delegate_to: orchestrator

# -----------------------------------------------------------------------------
# Agent-First Principle (Context Isolation)
# CRITICAL: All code work MUST be delegated to agents.
# Main chat orchestrates only - agents execute.
# This maximizes context efficiency through isolation.
# -----------------------------------------------------------------------------

agent_first:
  enabled: true
  description: |
    The main conversation should NEVER directly write/edit code.
    Instead, delegate ALL implementation work to specialized agents.

    Why: Agents have isolated context windows. When an agent finishes,
    only the result summary returns to main chat - not the full work context.
    This keeps main chat lean for orchestration decisions.

  rules:
    # Main chat responsibilities (orchestration only)
    main_chat:
      allowed:
        - User communication and clarification
        - Phase detection and workflow decisions
        - Agent selection and task delegation
        - Progress summaries and status updates
        - Quality gate enforcement decisions
      forbidden:
        - Direct file writes (Edit/Write tools)
        - Code implementation
        - Detailed code analysis (delegate to ask/researcher)
        - Bug fixing (delegate to debug)

    # Force delegation for these actions - COMPREHENSIVE LIST
    always_delegate:
      # === CODE WORK (debug) ===
      - pattern: "implement|write code|create file|edit file|fix bug|refactor"
        delegate_to: debug
        reason: "All code changes must be isolated"
      - pattern: "add feature|build|develop|code"
        delegate_to: debug
        reason: "Implementation work"
      - pattern: "test|write test|unit test|integration test"
        delegate_to: debug
        reason: "Test writing is code work"

      # === EXPLANATIONS (ask) ===
      - pattern: "explain|how does|walkthrough|what is|why does"
        delegate_to: ask
        reason: "Explanations benefit from focused analysis"
      - pattern: "understand|learn|teach me|show me"
        delegate_to: ask
        reason: "Learning queries"

      # === RESEARCH (researcher) ===
      - pattern: "analyze|document|research|compare|evaluate"
        delegate_to: researcher
        reason: "Analysis requires deep reading"
      - pattern: "find pattern|discover|extract|summarize codebase"
        delegate_to: researcher
        reason: "Codebase exploration"
      - pattern: "generate docs|write documentation|readme"
        delegate_to: researcher
        reason: "Documentation generation"

      # === SECURITY (security) ===
      - pattern: "review security|audit|vulnerability|pentest|owasp"
        delegate_to: security
        reason: "Security work requires specialized tools"
      - pattern: "check secrets|scan dependencies|cve|gdpr"
        delegate_to: security
        reason: "Compliance and scanning"

      # === DEVOPS (devops) ===
      - pattern: "deploy|docker|ci|pipeline|infrastructure|k8s|terraform"
        delegate_to: devops
        reason: "Infrastructure changes"
      - pattern: "github action|workflow|release|version bump"
        delegate_to: devops
        reason: "CI/CD and release management"
      - pattern: "container|helm|monitoring|logging"
        delegate_to: devops
        reason: "Operations work"

      # === ARCHITECTURE (architect) ===
      - pattern: "design|architecture|adr|system design|api design"
        delegate_to: architect
        reason: "Design decisions need focused thought"
      - pattern: "review api|review design|tech decision|trade-off"
        delegate_to: architect
        reason: "Architectural review"
      - pattern: "dependency analysis|module structure|component design"
        delegate_to: architect
        reason: "Structural analysis"

      # === MULTI-STEP (orchestrator) ===
      - pattern: "build complete|implement full|end-to-end|multiple steps"
        delegate_to: orchestrator
        reason: "Complex tasks need coordination"

      # === FILE READING (context optimization) ===
      - pattern: "read all|scan codebase|find in code|search files"
        delegate_to: researcher  # or Explore agent
        reason: "Large read operations should be isolated"
      - pattern: "explore|investigate|look through|check all"
        delegate_to: researcher
        reason: "Exploration benefits from isolation"

    # Exceptions where main chat MAY edit directly
    exceptions:
      - "workflow/*.md"      # Workflow artifacts (specs, progress)
      - "workflow/*.yml"     # Workflow config
      - ".claude/**/*.md"    # Agent/command definitions
      - "CHANGELOG.md"       # Release notes
      - "VERSION"            # Version file

  # Context savings estimation
  context_benefits:
    typical_task_context: 4000  # tokens used by agent during work
    returned_summary: 200       # tokens in result summary
    savings_per_delegation: 95  # percent context saved

# -----------------------------------------------------------------------------
# Predictive Features (Smart Suggestions)
# System learns from patterns and proactively suggests next steps.
# All predictions are advisory - user always has final decision.
# -----------------------------------------------------------------------------

predictive:
  enabled: true
  confidence_threshold: 0.7  # Only suggest when confidence >= 70%

  # Phase transition suggestions
  phase_transitions:
    - trigger: "spec.md modified 3+ times in session"
      suggest: "Spec scheint stabil. Bereit fuer /workflow:create-tasks?"
      confidence: 0.85

    - trigger: "all tasks in progress.md marked done"
      suggest: "Alle Tasks erledigt! Naechste Schritte: Review oder /workflow:release"
      confidence: 0.95

    - trigger: "shape.md created but no spec.md after 10 minutes"
      suggest: "Shape fertig? Weiter mit /workflow:write-spec"
      confidence: 0.75

    - trigger: "tasks.md exists but no progress.md"
      suggest: "Tasks bereit. Starte mit /workflow:orchestrate-tasks"
      confidence: 0.9

  # Smart standards suggestions based on task keywords
  standards_suggestions:
    - keywords: ["auth", "login", "session", "jwt", "oauth", "password"]
      standards: ["security/*", "api/error-handling"]
      suggest: "Security-relevanter Task erkannt. Security-Standards werden injiziert."

    - keywords: ["api", "endpoint", "rest", "graphql", "route"]
      standards: ["api/response-format", "api/error-handling"]
      suggest: "API-Task erkannt. API-Standards werden injiziert."

    - keywords: ["database", "migration", "schema", "model", "query"]
      standards: ["database/migrations", "global/naming"]
      suggest: "Database-Task erkannt. Database-Standards werden injiziert."

    - keywords: ["component", "ui", "style", "css", "layout", "form"]
      standards: ["frontend/components"]
      suggest: "Frontend-Task erkannt. Component-Standards werden injiziert."

    - keywords: ["test", "spec", "coverage", "mock", "assert"]
      standards: ["testing/coverage"]
      suggest: "Testing-Task erkannt. Testing-Standards werden injiziert."

    - keywords: ["docker", "ci", "pipeline", "deploy", "k8s", "terraform"]
      standards: ["devops/*"]
      suggest: "DevOps-Task erkannt. Infrastructure-Standards werden injiziert."

  # NaNo-driven suggestions (when patterns exist)
  nano_integration:
    enabled: true
    min_observations: 5  # Need at least 5 observations before suggesting

    suggestions:
      - pattern: "agent X chosen 80%+ for task_type Y"
        suggest: "Basierend auf bisherigen Patterns: {agent} ist optimal fuer {task_type}"

      - pattern: "user often skips phase 2 (shape)"
        suggest: "Du ueberspringst oft Shape. Vielleicht /workflow:quick nutzen?"

      - pattern: "debug tasks often need retry"
        suggest: "Debug-Tasks brauchen oft mehrere Versuche. Mehr Context hinzufuegen?"

      - pattern: "security reviews find issues frequently"
        suggest: "Security-Reviews finden oft Issues. Frueher reviewen?"

# -----------------------------------------------------------------------------
# Auto-Scope-Detection (Keyword-based)
# Automatically detects affected files and standards from task description.
# Fast keyword matching on filenames, directories, and patterns.
# -----------------------------------------------------------------------------

auto_scope:
  enabled: true
  method: keyword  # keyword | ast | hybrid

  # Keyword-to-directory mappings
  directory_patterns:
    # Authentication & Security
    - keywords: ["auth", "login", "logout", "session", "jwt", "oauth", "password", "token"]
      directories: ["src/auth/", "src/middleware/", "lib/auth/", "app/auth/"]
      files: ["*auth*", "*login*", "*session*", "*token*"]
      standards: ["security/*", "api/error-handling"]

    # API & Routes
    - keywords: ["api", "endpoint", "route", "controller", "handler", "rest", "graphql"]
      directories: ["src/api/", "src/routes/", "src/controllers/", "app/api/", "pages/api/"]
      files: ["*route*", "*controller*", "*handler*", "*api*"]
      standards: ["api/response-format", "api/error-handling"]

    # Database & Models
    - keywords: ["database", "db", "migration", "schema", "model", "entity", "query", "sql"]
      directories: ["src/models/", "src/entities/", "src/db/", "prisma/", "drizzle/", "migrations/"]
      files: ["*model*", "*entity*", "*schema*", "*migration*"]
      standards: ["database/migrations", "global/naming"]

    # Frontend & UI
    - keywords: ["component", "ui", "view", "page", "layout", "form", "button", "modal"]
      directories: ["src/components/", "src/ui/", "src/views/", "src/pages/", "app/", "components/"]
      files: ["*component*", "*view*", "*page*", "*.tsx", "*.vue", "*.svelte"]
      standards: ["frontend/components"]

    # Styles & Design
    - keywords: ["style", "css", "scss", "tailwind", "theme", "color", "font", "design"]
      directories: ["src/styles/", "styles/", "src/theme/"]
      files: ["*.css", "*.scss", "*.sass", "*style*", "*theme*", "tailwind.config.*"]
      standards: ["frontend/components"]

    # Testing
    - keywords: ["test", "spec", "jest", "vitest", "cypress", "playwright", "mock", "fixture"]
      directories: ["tests/", "test/", "__tests__/", "src/**/*.test.*", "src/**/*.spec.*"]
      files: ["*.test.*", "*.spec.*", "*mock*", "*fixture*"]
      standards: ["testing/coverage"]

    # DevOps & Infrastructure
    - keywords: ["docker", "container", "k8s", "kubernetes", "helm", "terraform", "ci", "cd", "pipeline", "deploy"]
      directories: [".github/", "infra/", "terraform/", "k8s/", "helm/", "docker/"]
      files: ["Dockerfile*", "docker-compose*", "*.tf", "*.yml", "*.yaml"]
      standards: ["devops/*"]

    # Configuration
    - keywords: ["config", "settings", "env", "environment", "options"]
      directories: ["src/config/", "config/"]
      files: ["*config*", "*.env*", "*settings*"]
      standards: ["global/tech-stack"]

    # Utils & Helpers
    - keywords: ["util", "helper", "lib", "common", "shared", "utils"]
      directories: ["src/utils/", "src/lib/", "src/helpers/", "src/common/", "lib/"]
      files: ["*util*", "*helper*", "*common*"]
      standards: ["global/naming"]

  # How to use detected scope
  scope_usage:
    # Include in delegation prompt
    include_in_prompt: true
    # Show to user for confirmation
    show_confirmation: false  # Set true for verbose mode
    # Max files to include in scope
    max_files: 10
    # Max directories to scan
    max_directories: 5

  # Fallback when no keywords match
  fallback:
    # Ask user for scope clarification
    ask_user: true
    # Default directories if nothing matches
    default_directories: ["src/"]
    # Default standards
    default_standards: ["global/tech-stack", "global/naming"]

  # Contextual hints in prompts
  contextual_hints:
    enabled: true
    max_hints_per_prompt: 2

    hint_templates:
      first_run: "Tipp: /workflow:quick fuer schnellen Einstieg, /workflow:smart-workflow fuer volle Power"
      spec_writing: "Tipp: Fokus auf Akzeptanzkriterien - was muss testbar sein?"
      task_creation: "Tipp: Kleine Tasks (1-2 Stunden) delegieren besser als grosse"
      orchestration: "Tipp: Phase-by-phase Modus fuer bessere Kontrolle"
      stuck: "Tipp: /workflow:help zeigt kontextbasierte Optionen"

# -----------------------------------------------------------------------------
# Favorites & Shortcuts
# Tracks frequently used commands and offers shortcuts.
# User data stored in .claude/preferences.local.md (gitignored).
# -----------------------------------------------------------------------------

favorites:
  enabled: true
  storage: ".claude/preferences.local.md"  # gitignored, GDPR-compliant

  # Auto-track command usage
  auto_track:
    enabled: true
    min_uses_for_favorite: 3  # Command becomes "favorite" after 3 uses

  # Default shortcuts (can be customized by user)
  default_shortcuts:
    sw: "/workflow:smart-workflow"
    q: "/workflow:quick"
    h: "/workflow:help"
    st: "/workflow:homunculus-status"
    rel: "/workflow:release"

  # Show favorites hint after N commands
  show_hint_after: 5

  # Favorite command suggestions
  suggestions:
    enabled: true
    show_in_help: true
    max_suggestions: 3

  # Template for preferences.local.md
  preferences_template: |
    # User Preferences (Local)

    ## Shortcuts
    # Format: shortcut: /command
    sw: /workflow:smart-workflow
    q: /workflow:quick
    h: /workflow:help

    ## Favorites
    # Auto-tracked frequently used commands
    # (updated automatically)

    ## Preferences
    # verbose_mode: false
    # auto_advance: true
    # default_execution_mode: phase-by-phase

# -----------------------------------------------------------------------------
# Live Feedback During Delegation
# Real-time progress updates while agents work.
# -----------------------------------------------------------------------------

live_feedback:
  enabled: true

  # Update frequency
  update_interval: "per_subtask"  # per_subtask | per_file | per_minute

  # Feedback format
  format:
    task_start: "🔄 Delegating to {agent}..."
    task_progress: "   ├─ {subtask} [{status}]"
    task_complete: "   └─ ✓ {task} completed ({duration})"
    phase_complete: "✅ Phase {n} complete ({tasks_done}/{tasks_total})"

  # What to show
  show:
    agent_name: true
    current_file: true
    subtask_status: true
    estimated_remaining: false  # Don't show time estimates

  # Streaming mode (requires Claude Code streaming support)
  streaming:
    enabled: false  # Set true when streaming is available
    buffer_size: 100  # characters before flush

# -----------------------------------------------------------------------------
# Execution Configuration
# Controls runtime behavior of the orchestration engine.
# -----------------------------------------------------------------------------

execution:
  # Default execution mode for /orchestrate-tasks
  # Options: automatic, phase-by-phase, task-by-task, selective
  default_mode: phase-by-phase

  # Maximum retries for a failed task before escalating to user
  max_retries: 2

  # Verification after each task completion
  verify_after_each: true

  # Progress tracking in progress.md
  track_progress: true

  # Parallel execution of independent tasks within the same phase
  parallel_within_phase: true

  # Timeout per task delegation (in seconds, 0 = no timeout)
  task_timeout: 300

  # Conditions that force orchestration to pause
  pause_on:
    - task_failure
    - dependency_missing
    - standards_violation
    - quality_gate_failed
    - security_finding_critical

  # Context window management
  context_optimization:
    # Only inject standards relevant to the specific task
    selective_injection: true
    # Summarize completed task outputs instead of including full content
    summarize_completed: true
    # Max tokens for delegation prompt (approximate)
    max_delegation_tokens: 6000
    # Compact completed task summaries to N sentences max
    summary_max_sentences: 3
    # Skip spec sections not relevant to current task
    selective_spec_excerpt: true
    # Only include acceptance criteria for current task (not full spec)
    minimal_acceptance_criteria: true

# -----------------------------------------------------------------------------
# Fallback Strategies
# Defines behavior when primary delegation fails or agent is unsuitable.
# "Alles was schiefgehen kann, geht schief. Dafuer gibt's Fallbacks."
# -----------------------------------------------------------------------------

fallbacks:
  # Agent unavailability (e.g., tool restrictions, context overflow)
  agent_unavailable:
    architect:
      fallback_to: researcher
      reason: "Researcher can analyze but not produce ADRs"
      limitation: "No architectural authority - findings are advisory"
    security:
      fallback_to: debug
      reason: "Debug has full access for security-relevant code review"
      limitation: "No access to trivy/grype/semgrep scanning tools"
    devops:
      fallback_to: debug
      reason: "Debug has full filesystem access for infrastructure code"
      limitation: "May lack infrastructure-specific domain knowledge"
    researcher:
      fallback_to: ask
      reason: "Ask can explain and analyze in read-only mode"
      limitation: "No WebSearch/WebFetch for external research"
    ask:
      fallback_to: researcher
      reason: "Researcher has similar read + explain capabilities"
      limitation: "Responses may be more formal/report-oriented"
    debug:
      fallback_to: null
      reason: "No fallback - debug is the primary implementor"
      escalation: user
    orchestrator:
      fallback_to: null
      reason: "No fallback - orchestrator is unique coordinator"
      escalation: user

  # Task failure after max_retries
  task_failure:
    strategy: escalate
    steps:
      - retry_with_additional_context   # Add more spec/standards context
      - retry_with_different_approach   # Rephrase delegation prompt
      - escalate_to_user                # Report failure with diagnostics
    diagnostics_include:
      - task_description
      - agent_assigned
      - error_or_output
      - standards_injected
      - suggested_resolution

  # Quality gate failure
  gate_failure:
    strategy: remediate
    steps:
      - identify_failing_checks
      - create_remediation_tasks
      - delegate_remediation
      - re_run_gate
    max_remediation_cycles: 2
    then: escalate_to_user

# -----------------------------------------------------------------------------
# Escalation Paths
# Defines how conflicts and unresolvable issues are handled.
# -----------------------------------------------------------------------------

escalation:
  # Priority levels for escalation
  levels:
    - name: info
      action: log_only
      notify: none
    - name: warning
      action: log_and_flag
      notify: progress_file
    - name: error
      action: pause_task
      notify: user
    - name: critical
      action: pause_orchestration
      notify: user

  # Conflict resolution between agents
  agent_conflicts:
    # When architect and security disagree
    architect_vs_security:
      priority: security  # Security wins by default
      escalate_if: architect_flags_blocking_concern
      resolution: user_decision

    # When debug implementation diverges from architect spec
    debug_vs_architect:
      priority: architect  # Spec authority wins
      action: debug_must_justify_divergence
      resolution: architect_reviews_justification

    # When devops and security conflict on infrastructure
    devops_vs_security:
      priority: security  # Security constraints are non-negotiable
      action: devops_proposes_alternative
      resolution: security_approves_alternative

# -----------------------------------------------------------------------------
# Observability and Monitoring
# Tracks orchestration health, delegation success rates, and bottlenecks.
# All data stays local (GDPR compliant).
# -----------------------------------------------------------------------------

observability:
  # Delegation log for debugging orchestration issues
  delegation_log:
    enabled: true
    path: workflow/specs/{folder}/delegation.log
    format: structured  # timestamp | agent | task | status | duration
    retention: per_spec  # Kept with the spec folder

  # Progress metrics (written to progress.md footer)
  metrics:
    track:
      - tasks_total
      - tasks_completed
      - tasks_failed
      - tasks_retried
      - average_task_duration
      - standards_injected_count
      - quality_gates_passed
      - quality_gates_failed
      - escalations_count
    format: markdown_table

  # Health indicators for the orchestration run
  health_checks:
    - name: agent_responsiveness
      description: "All delegated tasks complete within timeout"
      threshold: "task_timeout (300s)"
    - name: retry_rate
      description: "Percentage of tasks needing retries"
      warning_threshold: "20%"
      critical_threshold: "50%"
    - name: gate_pass_rate
      description: "Percentage of quality gates passing first time"
      warning_threshold: "70%"
      critical_threshold: "50%"
    - name: context_overflow
      description: "Delegation prompts exceeding max_delegation_tokens"
      action: "truncate_completed_summaries"

# -----------------------------------------------------------------------------
# Output Paths
# Where orchestration artifacts are stored for each spec.
# -----------------------------------------------------------------------------

output:
  # Per-spec orchestration config generated by /create-tasks
  spec_orchestration: workflow/specs/{folder}/orchestration.yml
  # Progress tracking updated by /orchestrate-tasks
  progress_file: workflow/specs/{folder}/progress.md
  # Task delegation logs
  delegation_log: workflow/specs/{folder}/delegation.log
  # Remediation tasks created by gate failures
  remediation_tasks: workflow/specs/{folder}/remediation.md

# -----------------------------------------------------------------------------
# Templates
# Standard formats for delegation prompts and progress reporting.
# The orchestrator uses these as structural guides.
# -----------------------------------------------------------------------------

templates:
  # Delegation prompt structure (used by orchestrator)
  # Optimized for minimal token usage while preserving essential context
  delegation_prompt: |
    Feature: "{feature-name}" | Task {task_id}: {task_title}

    ## Task
    {task_description}

    ## Context
    {relevant_spec_excerpt}

    **Completed:** {completed_dependencies_summary}

    ## Standards
    {injected_standards_content}

    ## Acceptance Criteria
    {acceptance_criteria_checkboxes}

    ## Scope
    Files: {file_paths}
    Constraints: Follow existing patterns. Stay within task scope. Flag uncertainties.

  # Progress report format
  progress_report: |
    # Progress: {feature_name}

    **Started:** {start_date}
    **Last Updated:** {timestamp}
    **Mode:** {execution_mode}
    **Health:** {health_status}

    ## Status

    | Task | Title | Agent | Status | Duration | Notes |
    |------|-------|-------|--------|----------|-------|
    {task_rows}

    ## Phase Progress
    {phase_checkboxes}

    ## Quality Gates
    | Gate | Status | Issues |
    |------|--------|--------|
    {gate_rows}

    ## Issues
    {issue_log}

    ## Metrics
    {metrics_table}
